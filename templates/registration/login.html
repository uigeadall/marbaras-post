{% extends "base.html" %}

{% block title %}Вход — {{ BRAND.name }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container narrow">
    <div class="login-card">
      <span class="kicker center" style="display:block;width:max-content;margin:0 auto;">Оператор</span>
      <h1 class="section-title">Вход в {{ BRAND.name }}</h1>
      {% if form.errors %}<p class="login-err">Грешно потребителско име или парола.</p>{% endif %}
      <form method="post" class="login-form">
        {% csrf_token %}
        <label>Потребителско име<input type="text" name="username" autofocus required></label>
        <label>Парола<input type="password" name="password" required></label>
        <button class="btn btn-primary btn-lg" type="submit">Вход</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
